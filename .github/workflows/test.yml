name: Test
on:
  push:
    branches:
      - main
  pull_request:
jobs:
  test:
    strategy:
      matrix:
        go: [ "oldstable", "stable" ]
        platform: [ ubuntu-latest, macos-latest, windows-latest ]
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Go
        uses: actions/setup-go@v7
        with:
          cache: true
          go-version: ${{ matrix.go }}
      - name: Install dependencies
        run: go mod tidy
      - name: Run tests
        run: go test -timeout 1h ./...
  coverage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Go
        uses: actions/setup-go@v7
        with:
          cache: true
          go-version: 'stable'
      - name: Install dependencies
        run: go mod tidy
      - name: Run coverage
        run: |
          go test -coverprofile=cov.out -covermode=atomic ./...
          grep -v "/examples/" cov.out > cov.lib.out
          total=$(go tool cover -func=cov.lib.out | tail -1 | awk '{print $NF}')
          echo "coverage=$total"
          if [ "$total" != "100.0%" ]; then
            echo "::error::library coverage dropped below 100% ($total)"
            go tool cover -func=cov.lib.out | awk '$NF != "100.0%" && $NF != "(statements)"'
            exit 1
          fi
  fuzz:
    strategy:
      matrix:
        go: [ "oldstable", "stable" ]
        platform: [ ubuntu-latest, macos-latest, windows-latest ]
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Go
        uses: actions/setup-go@v7
        with:
          cache: true
          go-version: ${{ matrix.go }}
      - name: Install dependencies
        run: go mod tidy
      - name: Fuzz parser (short)
        run: go test -run=^$ -fuzz=FuzzParser_StandardNeverPanics -fuzztime=30s .
      - name: Fuzz Next vs linear scan (short)
        run: go test -run=^$ -fuzz=FuzzSpecScheduleNext -fuzztime=30s .

  lockers-redis:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Go
        uses: actions/setup-go@v7
        with:
          cache: true
          go-version: 'stable'
      - name: Workspace against HEAD core
        run: go work init . lockers/redis
      - name: Test
        working-directory: lockers/redis
        run: go test -race -timeout 10m ./...

  lockers-postgres:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - "5432:5432"
        options: >-
          --health-cmd pg_isready --health-interval 5s
          --health-timeout 5s --health-retries 10
    env:
      CRON_PG_TEST_DSN: postgres://postgres:postgres@localhost:5432/postgres?sslmode=disable
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Go
        uses: actions/setup-go@v7
        with:
          cache: true
          go-version: 'stable'
      - name: Workspace against HEAD core
        run: go work init . lockers/postgres
      - name: Test
        working-directory: lockers/postgres
        run: go test -race -timeout 10m ./...

  contrib:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Go
        uses: actions/setup-go@v7
        with:
          cache: true
          go-version: 'stable'
      - name: Workspace against HEAD core
        run: go work init . contrib/prometheus contrib/otel
      - name: Test prometheus recorder
        working-directory: contrib/prometheus
        run: go test -race -timeout 10m ./...
      - name: Test otel wrapper
        working-directory: contrib/otel
        run: go test -race -timeout 10m ./...
